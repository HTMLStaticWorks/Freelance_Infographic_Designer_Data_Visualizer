<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | VisualData</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .countdown-item {
            background: white;
            padding: 20px;
            border-radius: 15px;
            min-width: 100px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="bg-primary text-white">

    <div class="container">
        <div class="row justify-content-center align-items-center vh-100 text-center">
            <div class="col-lg-8">
                <i class="bi bi-clock-history display-1 mb-4"></i>
                <h1 class="display-3 fw-bold mb-4">Launching Soon!</h1>
                <p class="lead mb-5 opacity-75">We are currently processing our new data visualization platform. Stay tuned for something amazing.</p>
                
                <div class="d-flex justify-content-center gap-3 mb-5">
                    <div class="countdown-item text-dark">
                        <h2 class="fw-bold mb-0">12</h2>
                        <small>Days</small>
                    </div>
                    <div class="countdown-item text-dark">
                        <h2 class="fw-bold mb-0">08</h2>
                        <small>Hours</small>
                    </div>
                    <div class="countdown-item text-dark">
                        <h2 class="fw-bold mb-0">45</h2>
                        <small>Mins</small>
                    </div>
                </div>
                
                <form class="row justify-content-center g-2">
                    <div class="col-md-6">
                        <input type="email" class="form-control form-control-lg border-0" placeholder="Enter your email">
                    </div>
                    <div class="col-md-auto">
                        <button class="btn btn-dark btn-lg px-5">Notify Me</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
