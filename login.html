<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VisualData</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">

    <div class="position-fixed top-0 end-0 m-4 d-flex gap-2" style="z-index: 1050;">
        <button id="rtlToggle" title="Toggle RTL" class="btn btn-light rounded-circle shadow-sm">
            RTL
        </button>
        <button id="themeToggle" title="Toggle Theme" class="btn btn-light rounded-circle shadow-sm">
            <i class="bi bi-moon-fill"></i>
        </button>
    </div>

    <div class="container">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-md-5">
                <div class="card p-5 shadow-lg border-0 rounded-4 position-relative">

                    <div class="text-center mb-4">
                        <a href="index.html" class="navbar-brand d-flex align-items-center justify-content-center mb-3">
                            <i class="bi bi-bar-chart-fill text-primary fs-2 me-2"></i>
                            <span class="fw-bold fs-3 text-body">Visual<span class="text-primary">Data</span></span>
                        </a>
                        <h4 class="fw-bold">Welcome Back</h4>
                        <p class="text-muted">Login to manage your data projects</p>
                    </div>
                    
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="passwordInput" placeholder="••••••••">
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-4 d-flex justify-content-between align-items-center">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label small" for="rememberMe">Remember me</label>
                            </div>
                            <a href="#" class="small text-primary text-decoration-none">Forgot Password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                    </form>
                    
                    <div class="text-center my-4">
                        <span class="text-muted small">Or login with</span>
                    </div>
                    
                    <div class="d-flex gap-3 justify-content-center">
                        <button class="btn btn-outline-secondary px-5 py-2"><i class="bi bi-google text-danger fs-5"></i></button>
                        <button class="btn btn-outline-secondary px-5 py-2"><i class="bi bi-apple text-body fs-5"></i></button>
                    </div>
                    
                    <p class="text-center mt-4 mb-0 small">Don't have an account? <a href="register.html" class="text-primary text-decoration-none">Sign Up</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
